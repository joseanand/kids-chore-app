spring.application.name=kids-chore-app

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:choredb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Check if backup exists, restore it; otherwise fall back to empty state safely
spring.datasource.data=file:backup.sql
# 1. Force Hibernate to create the tables first
spring.jpa.hibernate.ddl-auto=update

# 2. Tell Spring Boot to look for backup.sql in the root directory
spring.sql.init.data-locations=file:backup.sql

# 3. CRUCIAL: Delay initialization until AFTER JPA/Hibernate has built the tables
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# 4. Prevent application crash if backup.sql doesn't exist yet (e.g., first run)
spring.sql.init.continue-on-error=true

# Console and management
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.config.import=optional:file:src/main/resources/credentials.properties

server.port=80