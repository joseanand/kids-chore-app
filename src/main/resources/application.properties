spring.application.name=kids-chore-app

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:choredb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Check if backup exists, restore it; otherwise fall back to empty state safely
spring.datasource.data=file:backup.sql
spring.sql.init.continue-on-error=true
spring.sql.init.mode=always

# Console and management
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true